<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Autosure 续跑序列图</title>
  <desc id="desc">展示从 /autosure 3 到完成反馈的续跑序列。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="920" fill="url(#bg)"/>
  <text x="88" y="96" fill="#f8fafc" font-size="56" font-family="Inter, Arial, sans-serif" font-weight="700">Autosure 续跑序列</text>
  <text x="88" y="144" fill="#cbd5e1" font-size="26" font-family="Inter, Arial, sans-serif">从 /autosure 3 到可见进度，再到受控完成。</text>

  <rect x="100" y="240" width="240" height="90" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="148" y="295" fill="#f8fafc" font-size="30" font-family="Inter, Arial, sans-serif">操作者</text>

  <rect x="450" y="240" width="280" height="90" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="490" y="295" fill="#f8fafc" font-size="30" font-family="Inter, Arial, sans-serif">Control UI 胶囊</text>

  <rect x="860" y="240" width="230" height="90" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="918" y="295" fill="#f8fafc" font-size="30" font-family="Inter, Arial, sans-serif">插件</text>

  <rect x="1200" y="240" width="260" height="90" rx="20" fill="#0f172a" stroke="#334155"/>
  <text x="1262" y="295" fill="#f8fafc" font-size="30" font-family="Inter, Arial, sans-serif">会话</text>

  <line x1="220" y1="330" x2="220" y2="790" stroke="#475569" stroke-dasharray="10 10"/>
  <line x1="590" y1="330" x2="590" y2="790" stroke="#475569" stroke-dasharray="10 10"/>
  <line x1="975" y1="330" x2="975" y2="790" stroke="#475569" stroke-dasharray="10 10"/>
  <line x1="1330" y1="330" x2="1330" y2="790" stroke="#475569" stroke-dasharray="10 10"/>

  <path d="M240 390 H560" stroke="#d4af37" stroke-width="5" fill="none"/>
  <polygon points="560,390 540,380 540,400" fill="#d4af37"/>
  <text x="286" y="374" fill="#f8fafc" font-size="24" font-family="Inter, Arial, sans-serif">点击 3 / 发送 /autosure 3</text>

  <path d="M620 460 H945" stroke="#60a5fa" stroke-width="5" fill="none"/>
  <polygon points="945,460 925,450 925,470" fill="#60a5fa"/>
  <text x="654" y="444" fill="#f8fafc" font-size="24" font-family="Inter, Arial, sans-serif">立即 arm 首轮前台续跑</text>

  <path d="M1005 530 H1300" stroke="#34d399" stroke-width="5" fill="none"/>
  <polygon points="1300,530 1280,520 1280,540" fill="#34d399"/>
  <text x="1038" y="514" fill="#f8fafc" font-size="24" font-family="Inter, Arial, sans-serif">可见发动词进入当前会话</text>

  <path d="M1300 600 H620" stroke="#a78bfa" stroke-width="5" fill="none"/>
  <polygon points="620,600 640,590 640,610" fill="#a78bfa"/>
  <text x="844" y="584" fill="#f8fafc" font-size="24" font-family="Inter, Arial, sans-serif">状态更新：1/3 → 2/3</text>

  <path d="M1005 670 H1300" stroke="#34d399" stroke-width="5" fill="none"/>
  <polygon points="1300,670 1280,660 1280,680" fill="#34d399"/>
  <text x="1038" y="654" fill="#f8fafc" font-size="24" font-family="Inter, Arial, sans-serif">每轮完成后继续剩余轮次</text>

  <path d="M1300 740 H620" stroke="#f87171" stroke-width="5" fill="none"/>
  <polygon points="620,740 640,730 640,750" fill="#f87171"/>
  <text x="892" y="724" fill="#f8fafc" font-size="24" font-family="Inter, Arial, sans-serif">最终反馈：3/3 · 完成</text>

  <text x="88" y="848" fill="#94a3b8" font-size="22" font-family="Inter, Arial, sans-serif">关键点：不是盲目循环，也不是静默排队，而是可见、有边界、可停止的续跑。</text>
</svg>
